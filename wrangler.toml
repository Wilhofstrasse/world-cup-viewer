name = "world-cup-viewer"
main = "src/index.ts"
compatibility_date = "2026-05-01"

[vars]
# Deployed app version — surfaced via GET /api/version so the PWA footer shows
# the true running build even when the installed shell is cached.
APP_VERSION = "1.8.5"
# WM 2026 football (non-secret config). API-Football key is a secret:
#   wrangler secret put APIFOOTBALL_KEY
# WM_LEAGUE_ID 1 = FIFA World Cup (confirm on first live call).
WM_LEAGUE_ID = "1"
WM_SEASON = "2026"
# Football data provider. "fifa" = keyless FIFA API (api.fifa.com, has WM 2026);
# "apifootball" needs a paid key (free tier is paywalled to 2022–2024).
WM_API_PROVIDER = "fifa"
WM_FIFA_COMPETITION = "17"
WM_FIFA_SEASON = "285023"
# SRF proxy base — Cloudflare Tunnel from home Mac so non-CH viewers can
# watch the geo-fenced SRF reels. Empty = no proxy (CH visitors only).
# /api/config decides per-request via cf.country; CH visitors fetch direct.
# Live since 19.06.2026 via cloudflared LaunchAgent + Node proxy on the home
# Mac (see tools/srf-proxy/README.md). CH visitors fetch SRF direct
# (/api/config serves srfProxy="" for cf.country=CH); non-CH visitors get
# routed through the tunnel so the SRF reels stay watchable abroad.
SRF_PROXY_BASE = "https://srf.filipeandrade.com"

# Match schedule/scores/scorers blob (wm/matches.json). Create once:
#   wrangler r2 bucket create world-cup-data
[[r2_buckets]]
binding = "WM_R2"
bucket_name = "world-cup-data"

# Public custom domain (nice URL, no CF Access). wrangler provisions the DNS
# record + edge cert on deploy — filipeandrade.com is on this Cloudflare account.
[[routes]]
pattern = "wm.filipeandrade.com"
custom_domain = true

[assets]
directory = "./web"

[triggers]
# WM football ingest — self-gated inside runWmIngest to the tournament window +
# live/imminent/just-finished matches (respects the API free tier). Clips need
# no cron (resolved client-side, keyless).
crons = ["*/15 * * * *"]
