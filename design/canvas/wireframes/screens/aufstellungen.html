<!-- @dsCard group="Wireframes — Screens" -->
<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Aufstellungen — Wireframe</title>
<style>
:root{--paper:#f4f1ea;--surface:#fff;--ink:#1c1c1c;--dim:#8c8c8c;--faint:#b3aea3;--soft:#d8d2c6;--accent:#e6492f;--round:"SF Pro Rounded",ui-rounded,"Varela Round",-apple-system,system-ui,sans-serif;--mono:ui-monospace,Menlo,monospace;--yellow:#e6a800}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--round);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
.frame{max-width:380px;margin:0 auto;padding:0 0 24px}
.bar{display:flex;align-items:center;gap:6px;padding:10px 16px;background:var(--paper);border-bottom:2.5px solid var(--ink);margin-bottom:14px}
.back{width:34px;height:34px;border:none;background:transparent;color:var(--ink);font-size:24px;line-height:1}
.title{font-size:17px;font-weight:800}
.match{margin:0 14px 12px;background:var(--surface);border:1.5px solid var(--soft);border-radius:13px;padding:10px 12px}
.match .row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:700;font-size:15px}
.match .team{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.match .team.end{justify-content:flex-end;text-align:right}.match .team .f{font-size:20px}
.match .score{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:800;font-size:18px}
.match .when{text-align:center;margin-top:6px;font-family:var(--mono);font-size:11px;color:var(--dim)}
.side{display:flex;justify-content:center;margin:0 0 14px}
.side-pill{display:inline-flex;background:var(--surface);border:2px solid var(--ink);border-radius:999px;padding:3px}
.side-tab{font-size:12px;font-weight:700;padding:5px 14px;border-radius:999px}
.side-tab.on{background:var(--accent);color:#fff}
.pitch-wrap{margin:0 14px 14px;background:var(--surface);border:1.5px solid var(--soft);border-radius:14px;padding:10px;overflow:hidden}
.tactics{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--dim);padding:0 4px 6px}
.tactics b{color:var(--ink);font-weight:800;font-family:var(--round)}
svg{display:block;width:100%;height:auto}
.role{font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;fill:var(--dim);font-weight:700}
.shirt{font-family:"SF Pro Rounded",ui-rounded,system-ui,sans-serif;font-size:11px;font-weight:800;fill:var(--ink);text-anchor:middle;dominant-baseline:central}
.sname{font-family:"SF Pro Rounded",ui-rounded,system-ui,sans-serif;font-size:9.5px;font-weight:700;fill:var(--ink);text-anchor:middle}
.card{fill:none;stroke:none}
.book-y{fill:var(--yellow)}
.bench{margin:0 14px}
.bench h4{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0 4px 6px}
.bench-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px}
.b-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0}
.b-row .n{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:800;color:var(--accent);width:22px;text-align:right}
.b-row .nm{flex:1;min-width:0;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.b-row .ps{font-size:10px;color:var(--dim);font-family:var(--mono);text-transform:uppercase}
.legend{padding:8px 18px 0;font-size:10.5px;color:var(--dim)}
.legend span{display:inline-block;margin-right:10px}
.legend .sw{display:inline-block;width:10px;height:7px;border-radius:1px;vertical-align:middle;margin-right:4px}
.legend .sw.y{background:var(--yellow)}
</style></head><body>
<div class="frame">
  <div class="bar"><span class="back">‹</span><span class="title">Aufstellungen</span></div>

  <div class="match">
    <div class="row">
      <span class="team"><span class="f">🇦🇷</span>Argentinien</span><span class="score">2 – 1</span><span class="team end"><span class="f">🇧🇷</span>Brasilien</span>
    </div>
    <div class="when">Mi. 08.07., 21:00 · Halbfinale</div>
  </div>

  <div class="side"><div class="side-pill"><span class="side-tab on">Heim</span><span class="side-tab">Auswärts</span></div></div>

  <div class="pitch-wrap">
    <div class="tactics"><span>Argentinien — <b>4-3-3</b></span><span>Trainer: Scaloni</span></div>
    <svg viewBox="0 0 340 460" aria-label="Spielfeld 4-3-3">
      <!-- pitch lines -->
      <rect x="6" y="6" width="328" height="448" rx="10" fill="none" stroke="#d8d2c6" stroke-width="1.5"/>
      <line x1="6" y1="230" x2="334" y2="230" stroke="#d8d2c6" stroke-width="1"/>
      <circle cx="170" cy="230" r="38" fill="none" stroke="#d8d2c6" stroke-width="1"/>
      <rect x="80" y="6" width="180" height="58" fill="none" stroke="#d8d2c6" stroke-width="1"/>
      <rect x="80" y="396" width="180" height="58" fill="none" stroke="#d8d2c6" stroke-width="1"/>

      <text x="170" y="22" class="role" text-anchor="middle">FORWARDS</text>
      <text x="170" y="148" class="role" text-anchor="middle">MIDFIELD</text>
      <text x="170" y="288" class="role" text-anchor="middle">DEFENCE</text>
      <text x="170" y="436" class="role" text-anchor="middle">TOR</text>

      <!-- ST row (3) -->
      <g><circle cx="80" cy="80" r="18" fill="#f4f1ea" stroke="#1c1c1c" stroke-width="1.5"/><text x="80" y="80" class="shirt">22</text><text x="80" y="112" class="sname">Álvarez</text></g>
      <g><circle cx="170" cy="80" r="18" fill="#f4f1ea" stroke="#1c1c1c" stroke-width="1.5"/><text x="170" y="80" class="shirt">10</text><text x="170" y="112" class="sname">Messi</text></g>
      <g><circle cx="260" cy="80" r="18" fill="#f4f1ea" stroke="#1c1c1c" stroke-width="1.5"/><text x="260" y="80" class="shirt">11</text><text x="260" y="112" class="sname">Di María</text>
        <rect x="270" y="65" width="7" height="9" class="book-y"/>
      </g>

      <!-- MF row (3) -->
      <g><circle cx="80" cy="190" r="18" fill="#f4f1ea" stroke="#1c1c1c" stroke-width="1.5"/><text x="80" y="190" class="shirt">7</text><text x="80" y="222" class="sname">de Paul</text></g>
      <g><circle cx="170" cy="190" r="18" fill="#f4f1ea" stroke="#1c1c1c" stroke-width="1.5"/><text x="170" y="190" class="shirt">5</text><text x="170" y="222" class="sname">Paredes</text></g>
      <g><circle cx="260" cy="190" r="18" fill="#f4f1ea" stroke="#1c1c1c" stroke-width="1.5"/><text x="260" y="190" class="shirt">20</text><text x="260" y="222" class="sname">Mac Allister</text></g>

      <!-- DF row (4) -->
      <g><circle cx="55" cy="330" r="18" fill="#f4f1ea" stroke="#1c1c1c" stroke-width="1.5"/><text x="55" y="330" class="shirt">3</text><text x="55" y="362" class="sname">Tagliafico</text></g>
      <g><circle cx="135" cy="330" r="18" fill="#f4f1ea" stroke="#1c1c1c" stroke-width="1.5"/><text x="135" y="330" class="shirt">25</text><text x="135" y="362" class="sname">Otamendi</text></g>
      <g><circle cx="215" cy="330" r="18" fill="#f4f1ea" stroke="#1c1c1c" stroke-width="1.5"/><text x="215" y="330" class="shirt">13</text><text x="215" y="362" class="sname">Romero</text></g>
      <g><circle cx="295" cy="330" r="18" fill="#f4f1ea" stroke="#1c1c1c" stroke-width="1.5"/><text x="295" y="330" class="shirt">26</text><text x="295" y="362" class="sname">Molina</text></g>

      <!-- GK -->
      <g><circle cx="170" cy="420" r="18" fill="#f4f1ea" stroke="#e6492f" stroke-width="1.8"/><text x="170" y="420" class="shirt">1</text><text x="170" y="452" class="sname">E. Martínez</text></g>
    </svg>
    <div class="legend"><span><span class="sw y"></span>Gelb</span><span>⇅ Auswechslung</span><span>Position: 4-3-3</span></div>
  </div>

  <div class="bench">
    <h4>Ersatzbank</h4>
    <div class="bench-grid">
      <div class="b-row"><span class="n">12</span><span class="nm">Rulli</span><span class="ps">TW</span></div>
      <div class="b-row"><span class="n">8</span><span class="nm">Lo Celso</span><span class="ps">MF</span></div>
      <div class="b-row"><span class="n">9</span><span class="nm">L. Martínez</span><span class="ps">ST</span></div>
      <div class="b-row"><span class="n">16</span><span class="nm">Acuña</span><span class="ps">AV</span></div>
      <div class="b-row"><span class="n">17</span><span class="nm">Garnacho</span><span class="ps">ST</span></div>
      <div class="b-row"><span class="n">19</span><span class="nm">Lisandro</span><span class="ps">IV</span></div>
    </div>
  </div>
</div>
</body></html>
