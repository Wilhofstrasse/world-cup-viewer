<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Screen · Highlights</title>
<style>
:root{--paper:#f4f1ea;--ink:#1c1c1c;--dim:#8c8c8c;--surface:#fff;--accent:#e6492f;--faint:#b3aea3;--round:"SF Pro Rounded",ui-rounded,"Varela Round",-apple-system,system-ui,sans-serif;--mono:ui-monospace,Menlo,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--round);background:#222;-webkit-font-smoothing:antialiased}
.phone{position:relative;width:390px;height:760px;margin:0 auto;overflow:hidden;background:linear-gradient(160deg,#1f6b3a 0%,#2f8a4c 45%,#14502b 100%)}
.bar{position:absolute;top:0;left:0;right:0;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 16px;background:var(--paper);border-bottom:2.5px solid var(--ink)}
.brand{display:inline-flex;align-items:center;gap:9px}.menu{border:none;background:transparent;font-size:21px}.name{font-size:19px;font-weight:800;color:var(--ink)}.ver{font-family:var(--mono);font-size:9.5px;color:var(--dim)}
.tabs{display:inline-flex;background:#fff;border:2.5px solid var(--ink);border-radius:999px;padding:3px}.tab{font-size:14px;font-weight:700;padding:6px 15px;border-radius:999px;color:var(--ink)}.tab.on{background:var(--accent);color:#fff}
.play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:84px;height:84px;border-radius:50%;background:rgba(255,255,255,.94);color:#0f2748;font-size:30px;display:flex;align-items:center;justify-content:center;padding-left:6px;box-shadow:0 6px 24px rgba(0,0,0,.4)}
.scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,14,30,.25) 0%,rgba(5,14,30,0) 38%,rgba(5,14,30,.85) 100%)}
.meta{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:18px 18px 28px;color:#fff}
.flags{font-size:30px;display:block;margin-bottom:7px}
.teams{font-size:17px;font-weight:800;display:block;margin-bottom:4px}.vs{color:var(--faint);font-weight:600}
.title{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:8px;max-width:34ch;color:#f2f4f8}
.sub{font-size:12px;color:#c7d2e0;display:flex;gap:6px;align-items:center}.kind{font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}.dot{color:var(--faint)}
</style></head><body>
<div class="phone">
  <div class="scrim"></div>
  <div class="bar"><div class="brand"><button class="menu">☰</button><span class="name">WM 2026</span><span class="ver">v1.1.1</span></div><div class="tabs"><span class="tab on">Highlights</span><span class="tab">Spiele</span></div></div>
  <div class="play">▶</div>
  <div class="meta">
    <span class="flags">🇦🇹 🇯🇴</span>
    <span class="teams">Österreich <span class="vs">–</span> Jordanien</span>
    <div class="title">Die Live-Highlights bei Österreich - Jordanien</div>
    <div class="sub"><span class="kind">Spielzusammenfassung</span><span class="dot">·</span><span>Heute</span><span class="dot">·</span><span>7:12</span></div>
  </div>
</div>
</body></html>
