<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Match Card</title>
<style>
:root{--paper:#f4f1ea;--surface:#fff;--ink:#1c1c1c;--dim:#8c8c8c;--faint:#b3aea3;--soft:#d8d2c6;--accent:#e6492f;--accent-soft:#fbe3dd;--round:"SF Pro Rounded",ui-rounded,"Varela Round",-apple-system,system-ui,sans-serif;--mono:ui-monospace,Menlo,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--round);background:var(--paper);color:var(--ink);padding:20px;-webkit-font-smoothing:antialiased}
.wrap{max-width:360px}.cap{font-size:11px;font-weight:700;color:var(--dim);margin:14px 2px 6px}.cap:first-child{margin-top:0}
.card{background:var(--surface);border:1.5px solid var(--soft);border-radius:13px;padding:13px 15px}
.card.live{border-color:var(--accent);background:var(--accent-soft)}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.team{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;flex:1;min-width:0}
.team.end{justify-content:flex-end;text-align:right}.team .f{font-size:21px;flex:none}
.score{font-variant-numeric:tabular-nums;font-weight:800;font-size:19px;flex:none}
.vs{color:var(--faint)}
.when{text-align:center;margin-top:8px;font-family:var(--mono);font-size:11.5px;color:var(--dim)}
.badge{display:inline-block;margin-top:7px;color:var(--accent);font-weight:800;font-size:11px;font-family:var(--mono)}
.goals{margin-top:9px;padding-top:9px;border-top:1px solid var(--soft);font-size:12.5px;color:#555;line-height:1.7}
.g{white-space:nowrap}.g .m{font-variant-numeric:tabular-nums;color:var(--dim)}
</style></head><body>
<div class="wrap">
  <div class="cap">Bevorstehend</div>
  <div class="card"><div class="row"><span class="team"><span class="f">🇧🇷</span>Brasilien</span><span class="score vs">–</span><span class="team end"><span class="f">🇲🇦</span>Marokko</span></div><div class="when">Do. 18.06., 17:30</div></div>
  <div class="cap">Live (mit Torschützen)</div>
  <div class="card live"><div class="row"><span class="team"><span class="f">🇫🇷</span>Frankreich</span><span class="score">2–1</span><span class="team end"><span class="f">🇸🇳</span>Senegal</span></div><div class="badge">● LIVE 67'</div><div class="goals">⚽ <span class="g"><span class="m">23'</span> Mbappé</span> · <span class="g"><span class="m">51'</span> Olise</span> · <span class="g"><span class="m">58'</span> Sarr</span></div></div>
  <div class="cap">Beendet (mit Torschützen)</div>
  <div class="card"><div class="row"><span class="team"><span class="f">🇦🇷</span>Argentinien</span><span class="score">3–2</span><span class="team end"><span class="f">🇪🇸</span>Spanien</span></div><div class="goals">⚽ <span class="g"><span class="m">12'</span> Messi</span> · <span class="g"><span class="m">34'</span> Messi (FE)</span> · <span class="g"><span class="m">78'</span> Álvarez</span></div></div>
</div>
</body></html>
