<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Group Accordion</title>
<style>
:root{--paper:#f4f1ea;--surface:#fff;--ink:#1c1c1c;--dim:#8c8c8c;--faint:#b3aea3;--soft:#d8d2c6;--accent:#e6492f;--round:"SF Pro Rounded",ui-rounded,"Varela Round",-apple-system,system-ui,sans-serif;--mono:ui-monospace,Menlo,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--round);background:var(--paper);color:var(--ink);padding:20px;-webkit-font-smoothing:antialiased}
.wrap{max-width:380px}
.sec{font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:6px 4px 12px}
.acc{background:var(--surface);border:2px solid var(--soft);border-radius:16px;margin-bottom:12px;overflow:hidden}
.acc.open{border-color:var(--ink)}
.head{display:flex;align-items:center;justify-content:space-between;font-size:19px;font-weight:800;padding:17px 18px}
.chev{font-size:13px;color:var(--dim)}.acc.open .chev{transform:rotate(90deg);display:inline-block}
.body{padding:0 13px 10px}
.card{background:var(--paper);border:1.5px solid var(--soft);border-radius:13px;padding:13px 15px;margin-bottom:9px}
.card:last-child{margin-bottom:5px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.team{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;flex:1;min-width:0}
.team.end{justify-content:flex-end;text-align:right}.team .f{font-size:21px}
.score{font-weight:800;font-size:19px;color:var(--faint)}
.when{text-align:center;margin-top:8px;font-family:var(--mono);font-size:11.5px;color:var(--dim)}
</style></head><body>
<div class="wrap">
<div class="sec">Vorrunde</div>
<div class="acc open"><div class="head"><span>Gruppe A</span><span class="chev">▸</span></div>
  <div class="body">
    <div class="card"><div class="row"><span class="team"><span class="f">🇨🇿</span>Tschechien</span><span class="score">–</span><span class="team end"><span class="f">🇿🇦</span>Südafrika</span></div><div class="when">Do. 18.06., 17:30</div></div>
    <div class="card"><div class="row"><span class="team"><span class="f">🇲🇽</span>Mexiko</span><span class="score">–</span><span class="team end"><span class="f">🇰🇷</span>Südkorea</span></div><div class="when">Fr. 19.06., 02:50</div></div>
  </div>
</div>
<div class="acc"><div class="head"><span>Gruppe B</span><span class="chev">▸</span></div></div>
<div class="acc"><div class="head"><span>Gruppe C</span><span class="chev">▸</span></div></div>
<div class="sec">K.-o.-Runde</div>
<div class="acc"><div class="head"><span>Achtelfinal</span><span class="chev">▸</span></div></div>
</div>
</body></html>
