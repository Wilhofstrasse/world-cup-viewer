# cloudflared config for the SRF proxy tunnel.
#
# ⚠ REFERENCE, NOT SOURCE OF TRUTH. The LIVE tunnel is token/dashboard-managed
# (cloudflared runs with `--token <jwt>`, so its ingress comes from the
# Cloudflare dashboard, NOT this file). Editing this file does not change the
# running tunnel — adjust ingress in the CF Zero Trust dashboard. This file
# documents the intended local-file equivalent and is used only if you switch
# the tunnel back to a config-file run (`cloudflared tunnel --config … run`).
#
# ⚠ CH RESIDENCY IS LOAD-BEARING. SRF geoblocks by the egress IP of whoever
# fetches the playlist/segments — and that is THIS host (the proxy makes the
# outbound SRF requests). The proxy MUST run on a Switzerland-resident host
# (CH VPS, or a Mac physically in CH). Running it from abroad (e.g. a laptop in
# Germany) makes SRF geoblock the proxy exactly as it blocks a direct hit —
# non-CH visitors then get a black 0:00 player even though the tunnel is healthy.
#
# Tunnel UUID is generated by `cloudflared tunnel create wm-srf-proxy` — paste it below.
# The credentials JSON lives at ~/.cloudflared/<tunnel-uuid>.json after `cloudflared tunnel login`.
#
# Install (one-time):
#   cloudflared tunnel login                     # opens browser, picks the zone (filipeandrade.com)
#   cloudflared tunnel create wm-srf-proxy        # prints the UUID — paste below
#   cloudflared tunnel route dns wm-srf-proxy srf.filipeandrade.com
#
# Run interactively:
#   cloudflared tunnel --config /path/to/cloudflared-config.yml run
#
# Run as a LaunchAgent (persistent):
#   see com.filipeandrade.cloudflared.plist alongside this file

tunnel: REPLACE_WITH_TUNNEL_UUID
credentials-file: /Users/filipeandrade/.cloudflared/REPLACE_WITH_TUNNEL_UUID.json

# Ingress: srf.filipeandrade.com → local Node proxy at :8787.
# The catch-all 404 keeps any other hostname or stray request honest.
ingress:
  - hostname: srf.filipeandrade.com
    service: http://127.0.0.1:8787
    originRequest:
      connectTimeout: 10s
      noTLSVerify: true
      keepAliveConnections: 32
  - service: http_status:404
