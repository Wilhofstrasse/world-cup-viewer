<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="description" content="FIFA WM 2026 — Highlights & Spielplan.">
  <title>WM 2026</title>

  <!-- ── Installable PWA ── -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a1d3b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WM 2026">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">

  <link rel="stylesheet" href="wm/wm.css?v=1.0.1">
</head>
<body class="wm-body" data-tab="highlights">

  <!-- ── Top bar: app switch + WM sub-tabs ── -->
  <header class="wm-bar">
    <nav class="wm-appnav" aria-label="WM 2026">
      <span class="wm-appnav-link is-active" aria-current="page">⚽ WM 2026</span>
      <span id="appVer" class="wm-ver"></span>
    </nav>
    <div class="wm-tabs" role="tablist" aria-label="WM Ansicht">
      <button class="wm-tab" role="tab" data-tab="highlights" aria-selected="true">🎬 Highlights</button>
      <button class="wm-tab" role="tab" data-tab="spiele" aria-selected="false">📅 Spiele</button>
    </div>
  </header>

  <!-- ── Highlights: full-screen swipe feed ── -->
  <main id="view-highlights" class="wm-view" role="tabpanel" aria-label="Highlights">
    <button class="wm-menu-btn" id="wmMenuBtn" type="button" aria-label="Spiele auswählen" aria-expanded="false">☰</button>
    <aside class="wm-drawer" id="wmDrawer" aria-hidden="true" aria-label="Spiele auswählen">
      <div class="wm-drawer-head">Spiele</div>
      <div class="wm-drawer-list" id="wmDrawerList"></div>
      <a class="wm-drawer-foot" href="feedback.html">✉ Feedback senden</a>
    </aside>
    <div class="wm-drawer-scrim" id="wmDrawerScrim" hidden></div>
    <div class="wm-feed" id="wmFeed" aria-live="polite">
      <section class="wm-slide wm-empty"><p>Highlights werden geladen…</p></section>
    </div>
  </main>

  <!-- ── Spiele: schedule + scores + scorers ── -->
  <section id="view-spiele" class="wm-view" role="tabpanel" aria-label="Spiele" hidden>
    <div class="wm-matches" id="wmMatches" aria-live="polite">
      <p class="wm-state">Spielplan wird geladen…</p>
    </div>
  </section>

  <script type="module" src="wm/app.js?v=1.0.1"></script>
  <script src="appshell.js?v=1.0.1" defer></script>
</body>
</html>
