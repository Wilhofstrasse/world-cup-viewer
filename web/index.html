<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="description" content="FIFA WM 2026 — Highlights & Spielplan.">
  <title>WM 2026</title>

  <!-- ── Installable PWA ── -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#f4f1ea">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WM 2026">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <style>
    /* Critical view visibility — inlined so a stale/blocked external wm.css
       can never hide the active panel (root cause of blank Spiele). The
       !important show-rule beats the UA [hidden] rule AND any old non-important
       rule from a cached wm.css. JS no longer needs to clear [hidden]. */
    .wm-view { min-height: 100%; }
    .wm-body[data-tab="highlights"] #view-highlights,
    .wm-body[data-tab="spiele"]     #view-spiele,
    .wm-body[data-tab="mehr"]       #view-mehr { display: block !important; }
    .wm-body[data-tab="highlights"] #view-spiele,
    .wm-body[data-tab="highlights"] #view-mehr,
    .wm-body[data-tab="spiele"]     #view-highlights,
    .wm-body[data-tab="spiele"]     #view-mehr,
    .wm-body[data-tab="mehr"]       #view-highlights,
    .wm-body[data-tab="mehr"]       #view-spiele { display: none !important; }
    body:not([data-tab]) #view-highlights { display: block !important; }
    body:not([data-tab]) #view-spiele,
    body:not([data-tab]) #view-mehr { display: none !important; }
    #view-spiele, #view-mehr { padding: 76px 16px 24px; max-width: 640px; margin: 0 auto; }
    .wm-state { font-size: 13px; text-align: center; padding: 24px 0; color: #8c8c8c; }
  </style>
  <link rel="stylesheet" href="wm/wm.css?v=1.11.0">
</head>
<body class="wm-body" data-tab="highlights">

  <!-- ── Top bar: ☰ + brand on the left, segmented pill on the right.
       When a Mehr sub-view is active, the bar swaps to ‹ + sub-view title via
       the body[data-subview] selector — same chrome, less moving parts. ── -->
  <header class="wm-bar">
    <div class="wm-brand">
      <button class="wm-menu-btn" id="wmMenuBtn" type="button" aria-label="Zu einem Spiel springen" data-i18n-aria-label="common.jumpToMatch" aria-expanded="false" aria-controls="wmDrawer">☰</button>
      <button class="wm-back-btn" id="wmBackBtn" type="button" aria-label="Zurück" data-i18n-aria-label="common.back">‹</button>
      <span class="wm-appnav-link" aria-current="page" data-i18n="common.appTitle">WM 2026</span>
      <span class="wm-subtitle" id="wmSubtitle"></span>
      <span id="appVer" class="wm-ver"></span>
    </div>
    <div class="wm-tabs" role="tablist" aria-label="WM Ansicht" data-i18n-aria-label="common.viewSwitcherLabel">
      <button class="wm-tab" role="tab" data-tab="highlights" aria-selected="true" data-i18n="feed.tab">Highlights</button>
      <button class="wm-tab" role="tab" data-tab="spiele" aria-selected="false" data-i18n="spiele.tab">Spiele</button>
      <button class="wm-tab" role="tab" data-tab="mehr" aria-selected="false" data-i18n="mehr.tab">Mehr</button>
    </div>
  </header>

  <!-- ── Highlights: full-screen swipe feed ── -->
  <main id="view-highlights" class="wm-view" role="tabpanel" aria-label="Highlights" data-i18n-aria-label="feed.tab">
    <div class="wm-feed" id="wmFeed" aria-live="polite">
      <section class="wm-slide wm-empty"><p data-i18n="feed.loading">Highlights werden geladen…</p></section>
    </div>
  </main>

  <!-- ── Spiele: schedule by round/group, scores + scorers ── -->
  <section id="view-spiele" class="wm-view" role="tabpanel" aria-label="Spiele" data-i18n-aria-label="spiele.tab">
    <div class="wm-matches" id="wmMatches" aria-live="polite">
      <p class="wm-state" data-i18n="spiele.loading">Spielplan wird geladen…</p>
    </div>
  </section>

  <!-- ── Mehr: sub-view router (landing + Torjäger/Tabellen/K.-o.-Baum/…) ── -->
  <section id="view-mehr" class="wm-view" role="tabpanel" aria-label="Mehr" data-i18n-aria-label="mehr.tab">
    <div class="wm-mehr" id="wmMehr" aria-live="polite"></div>
  </section>

  <!-- ── Drawer overlay: body-level so ☰ works on both tabs ── -->
  <div class="wm-drawer-scrim" id="wmDrawerScrim" hidden></div>
  <aside class="wm-drawer" id="wmDrawer" aria-hidden="true" aria-label="Zu einem Spiel springen" data-i18n-aria-label="common.jumpToMatch">
    <div class="wm-drawer-head">
      <button class="wm-drawer-close" id="wmDrawerClose" type="button" aria-label="Schliessen" data-i18n-aria-label="common.close">✕</button>
      <span data-i18n="common.jumpToMatch">Zu einem Spiel springen</span>
    </div>
    <div class="wm-search">
      <input type="search" id="wmSearch" class="wm-search-input" placeholder="Team oder Gruppe…" data-i18n-placeholder="common.searchPlaceholder"
             autocomplete="off" autocorrect="off" autocapitalize="off" enterkeyhint="search"
             aria-label="Team oder Gruppe suchen" data-i18n-aria-label="common.searchLabel">
    </div>
    <div class="wm-drawer-list" id="wmDrawerList"></div>
  </aside>

  <script type="module" src="wm/app.js?v=1.11.0"></script>
  <script src="appshell.js?v=1.11.0" defer></script>
</body>
</html>
